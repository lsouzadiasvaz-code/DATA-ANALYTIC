<svg viewBox="0 0 860 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1d2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f" />
      <stop offset="100%" style="stop-color:#2563a8" />
    </linearGradient>
    <linearGradient id="connGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a2f" />
      <stop offset="100%" style="stop-color:#16a34a" />
    </linearGradient>
    <linearGradient id="apiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b1f5e" />
      <stop offset="100%" style="stop-color:#7c3aed" />
    </linearGradient>
    <linearGradient id="biGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b2a00" />
      <stop offset="100%" style="stop-color:#d97706" />
    </linearGradient>
    <linearGradient id="analyticsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2a3b" />
      <stop offset="100%" style="stop-color:#0e4f7a" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="520" fill="url(#bgGrad)" rx="16"/>

  <!-- Grid lines subtle -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="0" y1="65" x2="860" y2="65"/>
    <line x1="0" y1="130" x2="860" y2="130"/>
    <line x1="0" y1="195" x2="860" y2="195"/>
    <line x1="0" y1="260" x2="860" y2="260"/>
    <line x1="0" y1="325" x2="860" y2="325"/>
    <line x1="0" y1="390" x2="860" y2="390"/>
    <line x1="0" y1="455" x2="860" y2="455"/>
    <line x1="86" y1="0" x2="86" y2="520"/>
    <line x1="172" y1="0" x2="172" y2="520"/>
    <line x1="258" y1="0" x2="258" y2="520"/>
    <line x1="344" y1="0" x2="344" y2="520"/>
    <line x1="430" y1="0" x2="430" y2="520"/>
    <line x1="516" y1="0" x2="516" y2="520"/>
    <line x1="602" y1="0" x2="602" y2="520"/>
    <line x1="688" y1="0" x2="688" y2="520"/>
    <line x1="774" y1="0" x2="774" y2="520"/>
  </g>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700" letter-spacing="3">PIPELINE DE DADOS — DATA-ANALYTIC</text>
  <line x1="160" y1="44" x2="700" y2="44" stroke="#334155" stroke-width="1"/>

  <!-- ═══ BLOCK 1: PostgreSQL / Supabase ═══ -->
  <rect x="310" y="60" width="240" height="72" rx="12" fill="url(#dbGrad)" filter="url(#shadow)"/>
  <rect x="310" y="60" width="240" height="72" rx="12" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <text x="430" y="91" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700" letter-spacing="1">🐘  POSTGRESQL</text>
  <text x="430" y="109" text-anchor="middle" fill="#60a5fa" font-size="10">Supabase — Banco de dados na nuvem</text>
  <text x="430" y="124" text-anchor="middle" fill="#475569" font-size="9">Armazena pedidos · clientes · produtos</text>

  <!-- Arrow 1→2 -->
  <line x1="430" y1="132" x2="430" y2="155" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4,2"/>

  <!-- ═══ BLOCK 2: connect.py ═══ -->
  <rect x="330" y="156" width="200" height="54" rx="10" fill="url(#connGrad)" filter="url(#shadow)"/>
  <rect x="330" y="156" width="200" height="54" rx="10" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
  <text x="430" y="179" text-anchor="middle" fill="#86efac" font-size="11" font-weight="700">connect.py</text>
  <text x="430" y="197" text-anchor="middle" fill="#4ade80" font-size="9.5">Conexão · Extração SQL · psycopg</text>

  <!-- Arrow 2→3 -->
  <line x1="430" y1="210" x2="430" y2="232" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="4,2"/>

  <!-- ═══ BLOCK 3: Menager + dataframe ═══ -->
  <rect x="295" y="233" width="270" height="58" rx="10" fill="#1e2433" filter="url(#shadow)"/>
  <rect x="295" y="233" width="270" height="58" rx="10" fill="none" stroke="#64748b" stroke-width="1.5" opacity="0.5"/>
  <text x="430" y="257" text-anchor="middle" fill="#cbd5e1" font-size="11" font-weight="700">Menager.py  +  dataframe.py</text>
  <text x="430" y="277" text-anchor="middle" fill="#94a3b8" font-size="9.5">Orquestração · DataFrame principal</text>

  <!-- Arrow 3 → splits into 3 analytics -->
  <!-- vertical down -->
  <line x1="430" y1="291" x2="430" y2="310" stroke="#475569" stroke-width="2" stroke-dasharray="4,2"/>
  <!-- horizontal line -->
  <line x1="170" y1="310" x2="690" y2="310" stroke="#475569" stroke-width="2" stroke-dasharray="4,2"/>
  <!-- 3 down arrows -->
  <line x1="170" y1="310" x2="170" y2="332" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="430" y1="310" x2="430" y2="332" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="690" y1="310" x2="690" y2="332" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ═══ ANALYTICS BLOCKS ═══ -->
  <!-- analyticData -->
  <rect x="60" y="333" width="220" height="64" rx="10" fill="url(#analyticsGrad)" filter="url(#shadow)"/>
  <rect x="60" y="333" width="220" height="64" rx="10" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.5"/>
  <text x="170" y="355" text-anchor="middle" fill="#7dd3fc" font-size="10.5" font-weight="700">analyticData.py</text>
  <text x="170" y="372" text-anchor="middle" fill="#94a3b8" font-size="9">Análise Temporal · por Mês</text>
  <text x="170" y="387" text-anchor="middle" fill="#64748b" font-size="8.5">faturamento · qtd · outliers</text>

  <!-- analyticProduct -->
  <rect x="320" y="333" width="220" height="64" rx="10" fill="url(#analyticsGrad)" filter="url(#shadow)"/>
  <rect x="320" y="333" width="220" height="64" rx="10" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.5"/>
  <text x="430" y="355" text-anchor="middle" fill="#7dd3fc" font-size="10.5" font-weight="700">analyticProduct.py</text>
  <text x="430" y="372" text-anchor="middle" fill="#94a3b8" font-size="9">Análise por Produto · Região</text>
  <text x="430" y="387" text-anchor="middle" fill="#64748b" font-size="8.5">ranking · estado · faturamento</text>

  <!-- analyticClientes -->
  <rect x="580" y="333" width="220" height="64" rx="10" fill="url(#analyticsGrad)" filter="url(#shadow)"/>
  <rect x="580" y="333" width="220" height="64" rx="10" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.5"/>
  <text x="690" y="355" text-anchor="middle" fill="#7dd3fc" font-size="10.5" font-weight="700">analyticClientes.py</text>
  <text x="690" y="372" text-anchor="middle" fill="#94a3b8" font-size="9">Análise por Cliente · Ranking</text>
  <text x="690" y="387" text-anchor="middle" fill="#64748b" font-size="8.5">compras · valor acumulado</text>

  <!-- 3 arrows converge to routes.py -->
  <line x1="170" y1="397" x2="170" y2="415" stroke="#475569" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="430" y1="397" x2="430" y2="415" stroke="#475569" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="690" y1="397" x2="690" y2="415" stroke="#475569" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="170" y1="415" x2="690" y2="415" stroke="#475569" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="430" y1="415" x2="430" y2="432" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ═══ BLOCK 5: FastAPI routes ═══ -->
  <rect x="295" y="433" width="270" height="58" rx="10" fill="url(#apiGrad)" filter="url(#shadow)"/>
  <rect x="295" y="433" width="270" height="58" rx="10" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <text x="430" y="457" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">⚡  FastAPI — routes.py</text>
  <text x="430" y="476" text-anchor="middle" fill="#a78bfa" font-size="9.5">/vendas · /Data · /products · /clientes</text>

  <!-- Arrow → Power BI -->
  <line x1="565" y1="462" x2="695" y2="462" stroke="#d97706" stroke-width="2" marker-end="url(#arrowBlue)" opacity="0.8"/>

  <!-- ═══ BLOCK 6: Power BI ═══ -->
  <rect x="696" y="433" width="140" height="58" rx="10" fill="url(#biGrad)" filter="url(#shadow)"/>
  <rect x="696" y="433" width="140" height="58" rx="10" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <text x="766" y="457" text-anchor="middle" fill="#fcd34d" font-size="10.5" font-weight="700">📊 Power BI</text>
  <text x="766" y="474" text-anchor="middle" fill="#fbbf24" font-size="9">JSON → Dashboard</text>

  <!-- JSON label on arrow -->
  <rect x="595" y="451" width="88" height="18" rx="4" fill="#1e293b"/>
  <text x="639" y="463" text-anchor="middle" fill="#94a3b8" font-size="8.5" font-style="italic">JSON estruturado</text>

  <!-- legend bottom -->
  <text x="430" y="510" text-anchor="middle" fill="#334155" font-size="9" letter-spacing="1">DATA-ANALYTIC · FastAPI + pandas + PostgreSQL</text>
</svg>
